name: 'Run unit tests'
description: 'Runs unit tests for TypeScript projects using Vitest'

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: npm ci
      shell: bash

    - name: Run Vitest tests
      run: npx vitest run
      shell: bash
