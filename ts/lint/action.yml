name: 'Lint TypeScript project'
description: 'Installs dependencies and runs npm linters for TypeScript projects'

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

    - name: Install dependencies
      run: npm ci
      shell: bash

    - name: Run linters
      run: npm run lint
      shell: bash
