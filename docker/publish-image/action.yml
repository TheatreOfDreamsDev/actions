name: 'Publish Docker image'
description: 'Builds and pushes a Docker image to a registry'

inputs:
  image-name:
    required: true
    description: 'Fully qualified image name, for example ghcr.io/theatreofdreamsdev/meals-api'
  tag:
    required: false
    description: 'Image tag to publish. Defaults to github.ref_name'
  registry:
    required: false
    description: 'Container registry host'
    default: 'ghcr.io'
  username:
    required: false
    description: 'Registry username'
  password:
    required: true
    description: 'Registry password or token'
  context:
    required: false
    description: 'Docker build context'
    default: '.'
  file:
    required: false
    description: 'Dockerfile path'
    default: './Dockerfile'
  platforms:
    required: false
    description: 'Comma-separated target platforms'
    default: 'linux/amd64'
  provenance:
    required: false
    description: 'Whether to generate provenance attestations'
    default: 'false'

outputs:
  tag:
    description: 'Resolved image tag'
    value: ${{ steps.image.outputs.tag }}
  image:
    description: 'Published image reference'
    value: ${{ inputs.image-name }}:${{ steps.image.outputs.tag }}

runs:
  using: 'composite'
  steps:
  - name: Resolve image tag
    id: image
    shell: bash
    env:
      INPUT_TAG: ${{ inputs.tag }}
    run: |
      if [ -n "${INPUT_TAG}" ]; then
        tag="${INPUT_TAG}"
      else
        tag="${GITHUB_REF_NAME}"
      fi

      if [ -z "${tag}" ]; then
        echo "Unable to resolve image tag" >&2
        exit 1
      fi

      echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

  - name: Set up QEMU
    # QEMU is only needed for cross-arch builds (anything non-native to the
    # hosted runner — currently amd64). Skipping the install when we only
    # build amd64 trims ~30s off the run.
    if: contains(inputs.platforms, 'arm') || contains(inputs.platforms, 'ppc') || contains(inputs.platforms, 's390') || contains(inputs.platforms, 'riscv')
    uses: docker/setup-qemu-action@v3

  - name: Set up Docker Buildx
    uses: docker/setup-buildx-action@v3

  - name: Log in to registry
    uses: docker/login-action@v3
    with:
      registry: ${{ inputs.registry }}
      username: ${{ inputs.username || github.actor }}
      password: ${{ inputs.password }}

  - name: Build and push
    uses: docker/build-push-action@v6
    with:
      context: ${{ inputs.context }}
      file: ${{ inputs.file }}
      push: true
      platforms: ${{ inputs.platforms }}
      provenance: ${{ inputs.provenance }}
      tags: |
        ${{ inputs.image-name }}:${{ steps.image.outputs.tag }}
