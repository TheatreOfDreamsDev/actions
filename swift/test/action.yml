name: 'Test Swift project'
description: 'Runs unit tests for a Swift project using xcodebuild'

inputs:
  xcode-version:
    required: false
    type: string
    default: '16.4'
  scheme:
    required: true
    type: string
  workspace:
    required: true
    type: string
  destination:
    required: true
    type: string

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      shell: bash
      run: sudo xcode-select --switch /Applications/Xcode_${{ inputs.xcode-version }}.app/Contents/Developer

    - name: Build and run unit tests
      shell: bash
      run: |
        xcodebuild test \
          -verbose \
          -downloadPlatform iOS \
          -workspace "${{ inputs.workspace }}" \
          -scheme "${{ inputs.scheme }}" \
          -destination "${{ inputs.destination }}"
